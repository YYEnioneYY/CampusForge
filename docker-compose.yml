name: studenthub

services:
  auth-db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - studenthub-network

  profile-db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROFILE_DB_NAME}
      POSTGRES_USER: ${PROFILE_DB_USER}
      POSTGRES_PASSWORD: ${PROFILE_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - profile_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - studenthub-network

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - studenthub-network

  kafka:
    image: apache/kafka:4.3.1
    restart: unless-stopped
    hostname: kafka
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: >-
        PLAINTEXT://:9092,
        CONTROLLER://:9093,
        PLAINTEXT_HOST://:29092

      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:9092,
        PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - studenthub-network

  auth-migrate:
    build:
      context: ./auth-service
      target: migrate
    env_file:
      - ./auth-service/.env.docker
    environment:
      DATABASE_URL: >-
        postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}?schema=public
    depends_on:
      auth-db:
        condition: service_healthy
    restart: "no"
    networks:
      - studenthub-network

  profile-migrate:
    build:
      context: ./profile-service
      target: migrate
    env_file:
      - ./profile-service/.env.docker
    environment:
      DATABASE_URL: >-
        postgresql://${PROFILE_DB_USER}:${PROFILE_DB_PASSWORD}@profile-db:5432/${PROFILE_DB_NAME}?schema=public
    depends_on:
      profile-db:
        condition: service_healthy
    restart: "no"
    networks:
      - studenthub-network

  profile-service:
    build:
      context: ./profile-service
      target: runner
    restart: unless-stopped
    init: true
    env_file:
      - ./profile-service/.env.docker
    environment:
      NODE_ENV: production
      DATABASE_URL: >-
        postgresql://${PROFILE_DB_USER}:${PROFILE_DB_PASSWORD}@profile-db:5432/${PROFILE_DB_NAME}?schema=public
      KAFKA_BROKERS: kafka:9092
    depends_on:
      profile-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks:
      - studenthub-network

  notification-service:
    build:
      context: ./notification-service
      target: runner
    restart: unless-stopped
    init: true
    env_file:
      - ./notification-service/.env.docker
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studenthub-network

  auth-service:
    build:
      context: ./auth-service
      target: runner
    restart: unless-stopped
    init: true
    env_file:
      - ./auth-service/.env.docker
    environment:
      NODE_ENV: production
      DATABASE_URL: >-
        postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}?schema=public
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studenthub-network

  api-gateway:
    build:
      context: ./api-gateway
      target: runner
    restart: unless-stopped
    init: true
    env_file:
      - ./api-gateway/.env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      KAFKA_BROKERS: kafka:9092
      AUTH_COOKIE_SECURE: "false"
      TRUST_PROXY_HOPS: 0
    ports:
      - "3000:3000"
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - studenthub-network

volumes:
  auth_db_data:
  profile_db_data:
  redis_data:
  kafka_data:

networks:
  studenthub-network:
    driver: bridge