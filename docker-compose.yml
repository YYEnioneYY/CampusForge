services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./auth-service:/app
      - auth_node_modules:/app/node_modules
    depends_on:
      campusforge-auth-db:
        condition: service_healthy

  campusforge-auth-db:
    image: postgres:16
    container_name: campusforge-auth-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  auth_pg_data:
  auth_node_modules: