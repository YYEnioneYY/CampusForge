services:
  kafka:
    image: apache/kafka:latest
    container_name: campusforge-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - campusforge-network

  postgres-auth:
    image: postgres:16
    container_name: campusforge-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - campusforge-network

  postgres-notification:
    image: postgres:16
    container_name: campusforge-postgres-notification
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_NOTIFICATION_USER}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NOTIFICATION_DB}
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_NOTIFICATION_USER} -d ${POSTGRES_NOTIFICATION_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - campusforge-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: campusforge-api-gateway
    restart: unless-stopped
    environment:
      PORT: 3000

      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID_API_GATEWAY}
      KAFKA_GROUP_ID_API_GATEWAY: ${KAFKA_GROUP_ID_API_GATEWAY}
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT}:3000"
    networks:
      - campusforge-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: campusforge-auth-service
    restart: unless-stopped
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID_AUTH_SERVICE}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID_AUTH_SERVICE}

      DATABASE_URL: ${AUTH_DATABASE_URL}

      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}

      ARGON2_TYPE: ${ARGON2_TYPE}
      ARGON2_MEMORY_COST: ${ARGON2_MEMORY_COST}
      ARGON2_TIME_COST: ${ARGON2_TIME_COST}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM}

      EMAIL_VERIFICATION_SECRET: ${EMAIL_VERIFICATION_SECRET}
      EMAIL_VERIFICATION_EXPIRES_IN: ${EMAIL_VERIFICATION_EXPIRES_IN}
      EMAIL_VERIFICATION_URL: ${EMAIL_VERIFICATION_URL}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
    networks:
      - campusforge-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: campusforge-notification-service
    restart: unless-stopped
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID_NOTIFICATION_SERVICE}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID_NOTIFICATION_SERVICE}

      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
    networks:
      - campusforge-network

volumes:
  postgres_auth_data:
  postgres_notification_data:

networks:
  campusforge-network:
    driver: bridge